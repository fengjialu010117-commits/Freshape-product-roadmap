<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freshape 产品研发进度看板</title>
<style>
  :root {
    --primary: #2563eb; --primary-light: #eff6ff;
    --success: #16a34a; --success-light: #f0fdf4;
    --warning: #d97706; --warning-light: #fffbeb;
    --danger: #dc2626; --danger-light: #fef2f2;
    --gray: #6b7280; --gray-light: #f9fafb;
    --border: #e5e7eb; --text: #111827; --text-muted: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f3f4f6; color: var(--text); }

  /* HEADER */
  .header { background: white; border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 3px rgba(0,0,0,.06); gap: 12px; }
  .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .logo { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
  .header-title { font-size: 16px; font-weight: 600; white-space: nowrap; }
  .header-sub { font-size: 11px; color: var(--text-muted); }
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .hbtn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: white; font-size: 13px; cursor: pointer; color: var(--text); transition: all .15s; white-space: nowrap; }
  .hbtn:hover { background: var(--gray-light); }
  .hbtn.edit-active { background: #fef9c3; border-color: #fbbf24; color: #92400e; font-weight: 600; }
  .hbtn.primary { background: var(--primary); color: white; border-color: var(--primary); }
  .hbtn.primary:hover { background: #1d4ed8; }

  /* TOOLBAR */
  .toolbar { background: white; border-bottom: 1px solid var(--border); padding: 10px 28px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .filter-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .fbtn { padding: 4px 12px; border-radius: 16px; border: 1px solid var(--border); background: white; font-size: 12px; cursor: pointer; color: var(--text); transition: all .15s; }
  .fbtn:hover { border-color: var(--primary); color: var(--primary); }
  .fbtn.active { background: var(--primary); color: white; border-color: var(--primary); }
  .search-box { margin-left: auto; display: flex; align-items: center; gap: 6px; border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; background: var(--gray-light); }
  .search-box input { border: none; background: transparent; font-size: 13px; outline: none; width: 160px; }

  /* STATS BAR */
  .stats { background: white; border-bottom: 1px solid var(--border); padding: 0 28px; }
  .stats-bar { display: flex; align-items: stretch; gap: 12px; padding: 16px 28px; }
  .stat-bar-item { flex: 1; padding: 16px 20px; text-align: center; border-radius: 12px; border: 1px solid transparent; }
  .stat-bar-divider { display: none; }
  .stat-bar-num { font-size: 28px; font-weight: 800; line-height: 1; }
  .stat-bar-label { font-size: 11px; margin-top: 5px; font-weight: 600; opacity: .7; }

  /* TEAM PANELS */
  .team-panels { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .team-panel { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  .team-panel-header { padding: 16px 18px; color: white; display: flex; align-items: center; gap: 12px; }
  .team-avatar-lg { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,.2); border: 2px solid rgba(255,255,255,.4); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; }
  .team-panel-name { font-size: 15px; font-weight: 700; }
  .team-panel-meta { font-size: 12px; opacity: .8; margin-top: 2px; }
  .team-panel-body { padding: 4px 0; }
  .tp-row { display: flex; align-items: center; padding: 10px 16px; gap: 10px; cursor: pointer; transition: background .12s; border-bottom: 1px solid #f3f4f6; }
  .tp-row:last-child { border-bottom: none; }
  .tp-row:hover { background: #f9fafb; }
  .tp-name { flex: 1; font-size: 13px; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tp-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .tp-prog { width: 54px; height: 5px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
  .tp-prog-fill { height: 100%; border-radius: 3px; }
  .tp-pct { font-size: 11px; font-weight: 600; min-width: 28px; text-align: right; }
  .team-panel-body { transition: none; }
  .team-panel-body.collapsed { display: none; }
  .team-chevron { margin-left: auto; font-size: 13px; opacity: .7; transition: transform .2s; }
  .team-chevron.collapsed { transform: rotate(-90deg); }
  .team-avatar-img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,.6); flex-shrink: 0; }
  .avatar-upload-btn { position: absolute; bottom: -2px; right: -2px; width: 18px; height: 18px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
  .team-avatar-wrap { position: relative; flex-shrink: 0; }

  /* TEAM DETAIL PAGE */
  .tp-detail-product { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 12px; cursor: pointer; transition: box-shadow .15s, border-color .15s; }
  .tp-detail-product:hover { box-shadow: 0 4px 14px rgba(0,0,0,.08); border-color: #93c5fd; }
  .tp-detail-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .tp-detail-name { font-size: 16px; font-weight: 600; }
  .tp-detail-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
  .tp-detail-milestones { display: flex; align-items: flex-start; gap: 0; overflow-x: auto; padding: 10px 0 4px; margin-top: 4px; }
  .tpdm-item { display: flex; flex-direction: column; align-items: center; position: relative; min-width: 90px; flex: 1; }
  .tpdm-item:not(:last-child)::after { content: ''; position: absolute; top: 10px; left: 50%; width: 100%; height: 2px; background: #e5e7eb; z-index: 0; }
  .tpdm-item.done:not(:last-child)::after { background: var(--success); }
  .tpdm-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #d1d5db; background: white; z-index: 1; position: relative; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .tpdm-item.done .tpdm-dot { background: var(--success); border-color: var(--success); color: white; }
  .tpdm-item.current .tpdm-dot { background: #f59e0b; border-color: #f59e0b; color: white; box-shadow: 0 0 0 3px #fde68a; }
  .tpdm-name { font-size: 10px; text-align: center; margin-top: 6px; color: var(--text-muted); max-width: 80px; line-height: 1.3; }
  .tpdm-item.done .tpdm-name { color: var(--success); font-weight: 500; }
  .tpdm-item.current .tpdm-name { color: #b45309; font-weight: 600; }
  .tp-detail-update { margin-top: 10px; padding: 8px 12px; background: var(--gray-light); border-radius: 8px; font-size: 12px; }
  .show-more-btn { width: 100%; padding: 10px; background: var(--gray-light); border: 1px dashed var(--border); border-radius: 8px; font-size: 13px; color: var(--text-muted); cursor: pointer; margin-top: 4px; }
  .show-more-btn:hover { background: #e5e7eb; }

  /* MAIN */
  .main { padding: 20px 28px; }
  .section-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section-title span { font-size: 12px; color: var(--text-muted); font-weight: 400; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }

  /* GROUP VIEW */
  .group-section { margin-bottom: 28px; }
  .group-header { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 10px; margin-bottom: 14px; }
  .group-header-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .group-header-name { font-size: 16px; font-weight: 700; letter-spacing: .01em; }
  .group-header-meta { font-size: 12px; opacity: .75; margin-left: 4px; }
  .group-header-progress { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .group-mini-bar { width: 80px; height: 6px; background: rgba(255,255,255,.35); border-radius: 3px; overflow: hidden; }
  .group-mini-fill { height: 100%; border-radius: 3px; background: rgba(255,255,255,.9); }
  .group-mini-pct { font-size: 12px; font-weight: 600; }

  /* VIEW TOGGLE */
  .view-toggle { display: flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; margin-left: auto; }
  .vtbtn { padding: 4px 12px; border: none; background: white; font-size: 12px; cursor: pointer; color: var(--text-muted); transition: all .15s; }
  .vtbtn.active { background: var(--primary); color: white; }
  .vtbtn:hover:not(.active) { background: var(--gray-light); }

  /* CARD */
  .card { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 18px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.08); border-color: #bfdbfe; }
  .card-line-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .card-id { font-size: 11px; color: var(--text-muted); font-family: monospace; }
  .card-actions { display: flex; gap: 6px; align-items: center; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; }
  .edit-card-btn { display: none; padding: 3px 10px; border-radius: 6px; border: 1px solid #fbbf24; background: #fef9c3; color: #92400e; font-size: 11px; cursor: pointer; font-weight: 500; }
  .edit-mode .edit-card-btn { display: inline-block; }
  .card-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
  .card-line { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .card-desc { font-size: 13px; color: #374151; line-height: 1.6; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .progress-wrap { margin-bottom: 12px; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .progress-text { font-size: 11px; color: var(--text-muted); }
  .progress-pct { font-size: 13px; font-weight: 600; }
  .progress-bar { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 10px; }
  .card-owner { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); }
  .avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; font-weight: 600; }
  .card-dates { font-size: 11px; color: var(--text-muted); }
  .doc-count { font-size: 11px; color: var(--primary); background: var(--primary-light); padding: 2px 7px; border-radius: 8px; }

  /* STATUS */
  .status-规划中 { background: #eff6ff; color: #2563eb; }
  .status-dot-规划中 { background: #60a5fa; }
  .status-推进中 { background: #fef9ec; color: #a16207; }
  .status-dot-推进中 { background: #fbbf24; }
  .status-测试中 { background: #f5f3ff; color: #7c3aed; }
  .status-dot-测试中 { background: #a78bfa; }
  .status-已上线 { background: #f0fdf4; color: #16a34a; }
  .status-dot-已上线 { background: #4ade80; }
  .status-暂停 { background: #f8fafc; color: #64748b; }
  .status-dot-暂停 { background: #cbd5e1; }

  /* MODAL BASE */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; align-items: flex-start; justify-content: center; padding: 32px 16px; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 14px; width: 100%; max-width: 680px; box-shadow: 0 20px 60px rgba(0,0,0,.18); margin: auto; }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; position: sticky; top: 0; background: white; z-index: 1; border-radius: 14px 14px 0 0; }
  .modal-title-wrap .modal-id { font-size: 11px; color: var(--text-muted); font-family: monospace; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .modal-close { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--gray); flex-shrink: 0; margin-left: 8px; }
  .modal-close:hover { background: var(--gray-light); }
  .modal-body { padding: 20px 24px; max-height: calc(90vh - 100px); overflow-y: auto; }
  .modal-section { margin-bottom: 22px; }
  .modal-section-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .goal-box { background: var(--primary-light); border-left: 3px solid var(--primary); padding: 12px 14px; border-radius: 0 8px 8px 0; font-size: 13px; line-height: 1.7; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .info-item { background: var(--gray-light); padding: 10px 12px; border-radius: 8px; }
  .info-item .label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .info-item .value { font-size: 13px; font-weight: 500; }
  .big-progress-bar { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin: 8px 0; }
  .big-progress-fill { height: 100%; border-radius: 4px; }
  .big-progress-pct { font-size: 20px; font-weight: 700; }

  /* TIMELINE */
  .timeline { position: relative; padding-left: 22px; }
  .timeline::before { content: ''; position: absolute; left: 6px; top: 6px; bottom: 6px; width: 2px; background: var(--border); }
  .tl-item { position: relative; padding-bottom: 16px; }
  .tl-item:last-child { padding-bottom: 0; }
  .tl-dot { position: absolute; left: -22px; top: 3px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 2px #e5e7eb; background: #e5e7eb; }
  .tl-dot.done { background: var(--success); box-shadow: 0 0 0 2px #bbf7d0; }
  .tl-dot.current { background: var(--warning); box-shadow: 0 0 0 2px #fde68a; }
  .tl-name { font-size: 13px; font-weight: 500; }
  .tl-date { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .tl-note { font-size: 12px; color: #374151; margin-top: 4px; background: var(--gray-light); padding: 5px 8px; border-radius: 5px; }

  /* UPDATES */
  .update-item { padding: 10px 12px; background: var(--gray-light); border-radius: 8px; margin-bottom: 8px; }
  .update-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .update-content { font-size: 13px; line-height: 1.6; }

  /* DOCUMENTS */
  .doc-list { display: flex; flex-direction: column; gap: 8px; }
  .doc-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: white; }
  .doc-icon { font-size: 20px; flex-shrink: 0; }
  .doc-info { flex: 1; min-width: 0; }
  .doc-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .doc-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .doc-open-btn { padding: 4px 10px; border-radius: 6px; background: var(--primary); color: white; border: none; font-size: 12px; cursor: pointer; text-decoration: none; display: inline-block; }
  .doc-del-btn { padding: 4px 8px; border-radius: 6px; background: white; color: var(--danger); border: 1px solid #fca5a5; font-size: 12px; cursor: pointer; display: none; }
  .edit-mode-modal .doc-del-btn { display: inline-block; }
  .no-docs { text-align: center; padding: 20px; color: var(--text-muted); font-size: 13px; border: 1px dashed var(--border); border-radius: 8px; }

  /* ADD DOC FORM */
  .add-doc-form { border: 1px solid var(--border); border-radius: 8px; padding: 14px; background: var(--gray-light); display: none; }
  .edit-mode-modal .add-doc-form { display: block; }
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .form-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 120px; }
  .form-field label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .form-field input, .form-field select, .form-field textarea { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; background: white; font-family: inherit; }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
  .form-field textarea { resize: vertical; min-height: 70px; }
  .btn { padding: 7px 16px; border-radius: 7px; border: none; font-size: 13px; cursor: pointer; font-weight: 500; transition: all .15s; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-secondary { background: white; color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--gray-light); }
  .btn-danger { background: white; color: var(--danger); border: 1px solid #fca5a5; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  /* EDIT PRODUCT MODAL */
  .edit-section { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  .edit-section-title { font-size: 12px; font-weight: 600; color: #92400e; margin-bottom: 10px; }
  .range-wrap { display: flex; align-items: center; gap: 10px; }
  .range-wrap input[type=range] { flex: 1; }
  .range-val { font-size: 15px; font-weight: 700; color: var(--primary); min-width: 40px; }
  .milestone-edit-list { display: flex; flex-direction: column; gap: 6px; }
  .milestone-edit-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: white; border-radius: 6px; border: 1px solid var(--border); transition: border-color .15s, background .15s; }
  .milestone-edit-item.drag-over { border-color: #2563eb; background: #eff6ff; }
  .ms-drag-handle { cursor: grab; color: #cbd5e1; font-size: 16px; flex-shrink: 0; line-height: 1; user-select: none; }
  .ms-drag-handle:active { cursor: grabbing; }
  .ms-name-input { flex: 1; border: 1px solid transparent; border-radius: 5px; padding: 3px 6px; font-size: 13px; background: transparent; outline: none; font-family: inherit; min-width: 0; }
  .ms-name-input:hover, .ms-name-input:focus { border-color: var(--border); background: #f8fafc; }
  .ms-date-input { border: 1px solid transparent; border-radius: 5px; padding: 3px 5px; font-size: 12px; background: transparent; outline: none; color: var(--text-muted); font-family: inherit; }
  .ms-date-input:hover, .ms-date-input:focus { border-color: var(--border); background: #f8fafc; }
  .milestone-edit-item select { padding: 3px 6px; border: 1px solid var(--border); border-radius: 5px; font-size: 12px; }
  .status-select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; background: white; }

  /* IMPORT HIDDEN */
  #import-input { display: none; }

  /* NO RESULTS */
  .no-results { text-align: center; padding: 50px; color: var(--text-muted); }
  .no-results .icon { font-size: 40px; margin-bottom: 10px; }

  @media (max-width: 640px) {
    .header, .toolbar, .stats, .main { padding-left: 14px; padding-right: 14px; }
    .info-grid { grid-template-columns: 1fr; }
    .modal-body { padding: 14px 16px; }
    .modal-header { padding: 14px 16px; }
    .header-right .hbtn span { display: none; }
  }

  /* DETAIL PAGE */
  .detail-page { display: none; position: fixed; inset: 0; background: #f3f4f6; z-index: 150; overflow-y: auto; }
  .detail-page.open { display: block; }
  .detail-nav { background: white; border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; height: 56px; gap: 14px; position: sticky; top: 0; z-index: 10; }
  .back-btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: white; font-size: 13px; cursor: pointer; color: var(--text); }
  .back-btn:hover { background: var(--gray-light); }
  .detail-content { max-width: 860px; margin: 0 auto; padding: 28px 24px 60px; }
  .detail-header { background: white; border-radius: 14px; padding: 24px; margin-bottom: 16px; border: 1px solid var(--border); }
  .detail-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .detail-title { font-size: 24px; font-weight: 700; }

<script>
// ── State ──────────────────────────────────────────────────────
let appData = null;
let editMode = false;
const selectedMsMap = {};
let viewMode = 'group';
let filters = { status: 'all', line: 'all' };
const STORAGE_KEY = 'hiwood-roadmap-v2';
const MEMBERS = ['Haibo Zhang', 'Yong Liu'];
const teamCollapsed = {};
const SUPABASE_URL = 'https://sftmritlhxbluhxtddqv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmdG1yaXRsaHhibHVoeHRkZHF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NzgzOTAsImV4cCI6MjA5NzE1NDM5MH0.5Ta6XTE-I3H2SfrFgYw40wWGjCmEnL03Hx6m5ahTJng';

// ── Init ───────────────────────────────────────────────────────
async function init() {
  // 1. 先用本地缓存立即渲染（快）
  const localSaved = localStorage.getItem(STORAGE_KEY);
  if (localSaved) {
    try { appData = JSON.parse(localSaved); } catch(e) { appData = deepClone(DEFAULT_DATA); }
  } else {
    appData = deepClone(DEFAULT_DATA);
  }
  renderPage();
  const initHash = window.location.hash.replace('#', '');
  if (initHash) renderDetailPage(initHash);

  // 2. 再同步 Supabase 数据
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/roadmap?id=eq.1`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (r.ok) {
      const rows = await r.json();
      const serverData = rows[0]?.data;
      if (serverData && serverData.products) {
        const serverDate = serverData.lastUpdated || '2000-01-01';
        const localDate = appData.lastUpdated || '2000-01-01';
        if (serverDate >= localDate) {
          appData = serverData;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
          renderPage();
        } else {
          pushToServer();
        }
      } else {
        pushToServer();
      }
    }
  } catch(e) {
    // 本地模式（直接打开HTML文件），仅用localStorage
  }
}

function renderPage() {
  document.getElementById('hdr-title').textContent = 'Freshape 产品研发进度看板';
  document.getElementById('hdr-sub').textContent = '共 ' + appData.products.length + ' 个产品 · 最后更新 ' + (appData.lastUpdated||'').slice(0,10);
  const lines = [...new Set(appData.products.map(p => p.line))];
  const lf = document.getElementById('line-filters');
  lf.innerHTML = '<button class="fbtn active" onclick="setFilter(\'line\',\'all\',this)">全部</button>' +
    lines.map(l => `<button class="fbtn" onclick="setFilter('line','${esc(l)}',this)">${esc(l)}</button>`).join('');
  renderStats();
  renderProductMilestones();
  renderDigest();
  renderCards();
  renderCharts();
}

function renderProductMilestones() {
  const area = document.getElementById('pm-area');
  if (!area) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const groupColors = {'Yuetai Shang':'#2563eb','Yang Li':'#d97706','Haibo Zhang':'#16a34a','Yong Liu':'#7c3aed'};

  area.innerHTML = `<div class="pm-section">` +
    appData.products.map(p => {
      const pc = p.progress>=100?'#16a34a':p.progress>=60?'#2563eb':p.progress>=30?'#d97706':'#9ca3af';
      const accentColor = groupColors[p.group] || p.lineColor || '#6b7280';

      const msHTML = p.milestones.map((m,i) => {
        const overdue = m.status!=='done' && m.date && new Date(m.date)<today;
        const cls = overdue ? 'overdue' : m.status;
        return `<div class="pm-ms-item ${cls}">
          <div class="pm-ms-dot">${m.status==='done'?'✓':overdue?'!':''}</div>
          <div class="pm-ms-name">${esc(m.name)}</div>
          <div class="pm-ms-date">${esc(m.date||'')}</div>
          ${m.status==='current' ? (()=>{ const t=(m.tasks||[]).find(x=>!x.done); return t?`<div style="font-size:10px;color:#92400e;text-align:center;margin-top:2px;max-width:72px;line-height:1.3">▸ ${esc(t.text)}</div>`:''; })() : ''}
        </div>`;
      }).join('');

      const logs = (p.weeklyLogs||[]).slice().sort((a,b)=>b.meetingDate>a.meetingDate?1:-1);
      const latest = logs[0];
      const weeklyHTML = latest
        ? `<hr class="pm-divider">
           <div class="pm-weekly">
             <div class="pm-weekly-next">
               <div class="pm-weekly-label">本周计划</div>
               ${planItemsHTML(latest.nextPlan, p.id, latest.id, true)}
             </div>
             <div class="pm-weekly-done">
               <div class="pm-weekly-label">会议纪要</div>
               <div class="pm-weekly-text">${esc(latest.completed||'—')}</div>
             </div>
           </div>
           <div class="pm-weekly-meta">${esc(latest.meetingDate)} 周会${latest.author?' · '+esc(latest.author):''}</div>`
        : `<hr class="pm-divider"><div class="pm-no-log">暂无周会记录</div>`;

      return `<div class="pm-card" id="pm-card-${esc(p.id)}" onclick="openDetailPage('${esc(p.id)}')">
        <div style="height:5px;background:linear-gradient(90deg,${accentColor}cc,${accentColor}44);border-radius:14px 14px 0 0"></div>
        <div class="pm-card-body">
        <div class="pm-header">
          <div style="width:4px;height:36px;border-radius:2px;background:${accentColor};flex-shrink:0"></div>
          <div style="flex:1;min-width:0">
            <div class="pm-name">${esc(p.name)}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:3px">
              <span class="badge status-${esc(p.status)}" style="font-size:11px;padding:2px 9px">
                <span class="badge-dot status-dot-${esc(p.status)}"></span>${esc(p.status)}
              </span>
              <span style="font-size:11px;color:#94a3b8">${esc(p.group||'')}${p.line?' · '+esc(p.line):''}</span>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div class="pm-pct" style="color:${pc}">${p.progress}%</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:2px">${p.milestones.filter(m=>m.status==='done').length}/${p.milestones.length} 里程碑</div>
          </div>
        </div>
        ${p.milestones.length ? `<div class="pm-ms-row">${msHTML}</div>` : ''}
        ${weeklyHTML}
        </div>
      </div>`;
    }).join('') + `</div>`;
}

function renderDigest() {
  const area = document.getElementById('digest-area');
  if (!area) return;
  const today = new Date();
  const cutoff = new Date(today); cutoff.setDate(cutoff.getDate() - 21);
  const items = appData.products.map(p => {
    const logs = (p.weeklyLogs || []).slice().sort((a,b) => b.meetingDate > a.meetingDate ? 1 : -1);
    const latest = logs[0];
    const recent = latest && new Date(latest.meetingDate) >= cutoff;
    return { p, latest: recent ? latest : null };
  });
  const digestOpen = sessionStorage.getItem('digest-open') !== 'false';
  area.innerHTML = `
    <div class="digest-toggle" onclick="toggleDigest()">
      <div class="digest-toggle-title">
        <span class="digest-toggle-dot"></span>本周快报
      </div>
      <span class="digest-toggle-arrow ${digestOpen?'open':''}" id="digest-arrow">▾</span>
    </div>
    <div class="digest-grid ${digestOpen?'open':''}" id="digest-grid">
      ${items.map(({p, latest}) => {
        const statusDot = `<span style="width:6px;height:6px;border-radius:50%;display:inline-block;background:${
          p.status==='已上线'?'#4ade80':p.status==='推进中'?'#fbbf24':p.status==='测试中'?'#a78bfa':'#cbd5e1'}"></span>`;
        if (!latest) return `
          <div class="digest-item" onclick="scrollToPmCard('${esc(p.id)}')" style="cursor:pointer">
            <div class="digest-product-name">${statusDot}${esc(p.name)}</div>
            <div class="digest-meta">${esc(p.status)}</div>
            <div class="digest-empty">暂无本期记录</div>
          </div>`;
        return `
          <div class="digest-item" onclick="scrollToPmCard('${esc(p.id)}')" style="cursor:pointer">
            <div class="digest-product-name">${statusDot}${esc(p.name)}</div>
            <div class="digest-meta">${esc(latest.meetingDate)} 周会 · ${esc(latest.author||'')}</div>
            ${latest.nextPlan && (Array.isArray(latest.nextPlan) ? latest.nextPlan.length : latest.nextPlan) ? `<div class="digest-section next">
              <div class="digest-section-label">本周计划</div>
              <div class="digest-section-text">${Array.isArray(latest.nextPlan) ? latest.nextPlan.map(i=>`<div style="display:flex;align-items:flex-start;gap:5px;margin-bottom:2px"><span style="flex-shrink:0;margin-top:1px">${i.done?'✓':'○'}</span><span style="${i.done?'text-decoration:line-through;color:#9ca3af':''}">${esc(i.text)}</span></div>`).join('') : esc(latest.nextPlan)}</div>
            </div>` : '<div class="digest-empty">暂无本周计划</div>'}
          </div>`;
      }).join('')}
    </div>
  `;
}

function scrollToPmCard(pid) {
  const el = document.getElementById('pm-card-' + pid);
  if (!el) return;
  const top = el.getBoundingClientRect().top + window.scrollY - 72;
  window.scrollTo({ top, behavior: 'smooth' });
}

function toggleDigest() {
  const grid = document.getElementById('digest-grid');
  const arrow = document.getElementById('digest-arrow');
  const isOpen = grid.classList.toggle('open');
  arrow.classList.toggle('open', isOpen);
  sessionStorage.setItem('digest-open', isOpen);
}

function renderCharts() {
  const p = appData.products;
  if (!p.length) return;
  const groupOrder = ['Yuetai Shang', 'Yang Li', 'Haibo Zhang', 'Yong Liu'];
  const groupColors = { 'Yuetai Shang': '#2563eb', 'Yang Li': '#d97706', 'Haibo Zhang': '#16a34a', 'Yong Liu': '#7c3aed' };
  const statusColors = { '规划中':'#0369a1','推进中':'#f59e0b','测试中':'#7c3aed','已上线':'#16a34a','暂停':'#9ca3af' };
  const groups = groupOrder.filter(g => p.some(x => (x.group||'Other') === g));

  const teamCards = groups.map(group => {
    const items = p.filter(x => (x.group||'Other') === group);
    const avg = Math.round(items.reduce((a,x) => a+x.progress, 0) / items.length);
    const color = groupColors[group] || '#6b7280';
    const pc = avg >= 100 ? '#16a34a' : avg >= 60 ? '#2563eb' : avg >= 30 ? '#d97706' : '#9ca3af';
    const statusCounts = {};
    ['规划中','推进中','测试中','已上线','暂停'].forEach(s => { statusCounts[s] = items.filter(x=>x.status===s).length; });
    const total = items.length;
    const segBar = Object.entries(statusCounts).filter(([,c])=>c>0).map(([s,c])=>
      `<div class="status-seg" style="background:${statusColors[s]};width:${(c/total*100).toFixed(1)}%"></div>`
    ).join('');
    const legend = Object.entries(statusCounts).filter(([,c])=>c>0).map(([s,c])=>
      `<div class="status-legend-item"><div class="status-legend-dot" style="background:${statusColors[s]}"></div>${s} ${c}</div>`
    ).join('');
    return `
    <div class="chart-card">
      <div class="chart-card-header" style="background:${color}">
        <div class="chart-card-name">${esc(group)}</div>
        <div class="chart-card-sub">${total} 个产品</div>
      </div>
      <div class="chart-card-body">
        <div class="chart-row">
          <span class="chart-label">平均进度</span>
          <span class="chart-val" style="color:${pc}">${avg}%</span>
        </div>
        <div class="chart-progress"><div class="chart-progress-fill" style="width:${avg}%;background:${pc}"></div></div>
        <div class="chart-label" style="margin-bottom:6px">状态分布</div>
        <div class="status-seg-bar">${segBar}</div>
        <div class="status-legend">${legend}</div>
      </div>
    </div>`;
  }).join('');

  // overall status bar chart
  const allStatus = ['推进中','测试中','已上线','规划中','暂停'];
  const maxCount = Math.max(...allStatus.map(s => p.filter(x=>x.status===s).length), 1);
  const overviewBars = allStatus.map(s => {
    const count = p.filter(x=>x.status===s).length;
    if (!count) return '';
    const w = Math.round(count/maxCount*100);
    return `<div class="overview-bar-row">
      <div class="overview-bar-label">${s}</div>
      <div class="overview-bar-track"><div class="overview-bar-fill" style="width:${w}%;background:${statusColors[s]}"></div></div>
      <div class="overview-bar-val" style="color:${statusColors[s]}">${count}</div>
    </div>`;
  }).join('');

  document.getElementById('charts-area').innerHTML = `
    <div class="charts-title">进度概览</div>
    <div class="charts-grid">
      ${teamCards}
      <div class="overview-card">
        <div class="overview-title">全部产品状态分布</div>
        ${overviewBars}
      </div>
    </div>
  `;
}

function saveData() {
  appData.lastUpdated = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  pushToServer();
  document.getElementById('hdr-sub').textContent = '共 ' + appData.products.length + ' 个产品 · 最后更新 ' + appData.lastUpdated.slice(0,10);
}

function pushToServer() {
  fetch(`${SUPABASE_URL}/rest/v1/roadmap?id=eq.1`, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ data: appData })
  }).catch(() => {});
}

function deepClone(o) { return JSON.parse(JSON.stringify(o)); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Edit Mode ──────────────────────────────────────────────────
function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('edit-toggle-btn');
  const body = document.body;
  if (editMode) {
    btn.classList.add('edit-active');
    btn.innerHTML = '✅ <span>退出编辑</span>';
    body.classList.add('edit-mode');
  } else {
    btn.classList.remove('edit-active');
    btn.innerHTML = '✏️ <span>编辑模式</span>';
    body.classList.remove('edit-mode');
  }
}

// ── Stats ──────────────────────────────────────────────────────
function renderStats() {
  const p = appData.products;
  if (!p.length) return;
  const teams = new Set(p.map(x => x.group || 'Other')).size;
  const inProgress = p.filter(x => x.status === '推进中').length;
  const launched = p.filter(x => x.status === '已上线').length;
  const avg = Math.round(p.reduce((a,b) => a+b.progress, 0) / p.length);
  document.getElementById('stats-area').innerHTML = `
    <div class="stats-bar">
      <div class="stat-bar-item" style="background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8">
        <div class="stat-bar-num">${teams}</div>
        <div class="stat-bar-label">团队</div>
      </div>
      <div class="stat-bar-item" style="background:#f0fdf4;border-color:#bbf7d0;color:#15803d">
        <div class="stat-bar-num">${p.length}</div>
        <div class="stat-bar-label">产品总数</div>
      </div>
      <div class="stat-bar-item" style="background:#fffbeb;border-color:#fde68a;color:#b45309">
        <div class="stat-bar-num">${inProgress}</div>
        <div class="stat-bar-label">推进中</div>
      </div>
      <div class="stat-bar-item" style="background:#f0fdf4;border-color:#bbf7d0;color:#16a34a">
        <div class="stat-bar-num">${launched}</div>
        <div class="stat-bar-label">已上线</div>
      </div>
      <div class="stat-bar-item" style="background:#faf5ff;border-color:#e9d5ff;color:#7c3aed">
        <div class="stat-bar-num">${avg}%</div>
        <div class="stat-bar-label">平均进度</div>
      </div>
    </div>`;
}

// ── Cards ──────────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase();
  return appData.products.filter(p => {
    if (filters.status !== 'all' && p.status !== filters.status) return false;
    if (filters.line !== 'all' && p.line !== filters.line) return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.description.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderCards() {
  const list = getFiltered();
  const grid = document.getElementById('card-grid');
  const noRes = document.getElementById('no-results');
  if (!list.length) { grid.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';
  renderTeamPanels(list, grid);
}

const PREVIEW_LIMIT = 7;

function renderTeamPanels(list, grid) {
  const groupOrder = ['Yuetai Shang', 'Yang Li', 'Haibo Zhang', 'Yong Liu'];
  const groupColors = { 'Yuetai Shang': '#2563eb', 'Yang Li': '#d97706', 'Haibo Zhang': '#16a34a', 'Yong Liu': '#7c3aed' };
  const activeGroups = groupOrder.filter(g => appData.products.some(p => (p.group||'Other') === g));
  const avatars = appData.teamAvatars || {};
  grid.className = '';
  grid.innerHTML = `<div class="team-panels">` + activeGroups.map(group => {
    const items = list.filter(p => (p.group||'Other') === group);
    if (!items.length) return '';
    const allItems = appData.products.filter(p => (p.group||'Other') === group);
    const color = groupColors[group] || '#6b7280';
    const avg = Math.round(allItems.reduce((a,p) => a+p.progress, 0) / allItems.length);
    const avatarHTML = avatars[group]
      ? `<img src="${avatars[group]}" class="team-avatar-img">`
      : `<div class="team-avatar-lg">${group.charAt(0).toUpperCase()}</div>`;
    const preview = items.slice(0, PREVIEW_LIMIT);
    const hasMore = items.length > PREVIEW_LIMIT;
    const rows = preview.map(p => {
      const pc = p.progress >= 100 ? '#16a34a' : p.progress >= 60 ? '#2563eb' : p.progress >= 30 ? '#d97706' : '#9ca3af';
      const todayTp = new Date(); todayTp.setHours(0,0,0,0);
      const curMtp = p.milestones.find(m=>m.status==='current') || p.milestones.find(m=>m.status==='upcoming');
      const overdueCountTp = p.milestones.filter(m=>m.status!=='done'&&m.date&&new Date(m.date)<todayTp).length;
      return `<div class="tp-row" onclick="openDetailPage('${esc(p.id)}')">
        <div class="tp-name">
          ${esc(p.name)}
          ${curMtp?`<div style="font-size:10px;color:#94a3b8;margin-top:2px;font-weight:400">${esc(curMtp.name)}</div>`:''}
          ${overdueCountTp?`<div style="font-size:10px;color:#dc2626;font-weight:600;margin-top:1px">⚠ ${overdueCountTp} 项逾期</div>`:''}
        </div>
        <div class="tp-right">
          <span class="badge status-${esc(p.status)}" style="font-size:10px;padding:2px 7px">
            <span class="badge-dot status-dot-${esc(p.status)}"></span>${esc(p.status)}
          </span>
          <div class="tp-prog"><div class="tp-prog-fill" style="width:${p.progress}%;background:${pc}"></div></div>
          <span class="tp-pct" style="color:${pc}">${p.progress}%</span>
        </div>
      </div>`;
    }).join('');
    return `
    <div class="team-panel">
      <div class="team-panel-header" style="background:${color}">
        <label class="team-avatar-wrap" style="cursor:pointer" title="点击更换头像">
          ${avatarHTML}
          <input type="file" accept="image/*" style="display:none" onchange="uploadTeamAvatar('${esc(group)}',this)">
        </label>
        <div style="flex:1;min-width:0">
          <div class="team-panel-name">${esc(group)}</div>
          <div class="team-panel-meta">${allItems.length} 个产品 · 平均 ${avg}%</div>
        </div>
      </div>
      <div class="team-panel-body">
        ${rows}
        ${hasMore ? `<div style="padding:10px 16px;font-size:12px;color:var(--text-muted);text-align:center">还有 ${items.length - PREVIEW_LIMIT} 个产品 · 点击查看全部</div>` : ''}
      </div>
    </div>`;
  }).join('') + `</div>`;
}

// ── Team Page ───────────────────────────────────────────────────
function openTeamPage(group) {
  history.pushState({ group }, '', '#team-' + group.replace(/\s/g,'-'));
  renderTeamPage(group);
}

function closeTeamPage() {
  history.back();
}

function renderTeamPage(group) {

  const color = groupColors[group] || '#6b7280';
  const avatars = appData.teamAvatars || {};
  const products = appData.products.filter(p => (p.group||'Other') === group);

  const launched = products.filter(p => p.status === '已上线').length;
  const inProgress = products.filter(p => p.status === '推进中').length;
  const avatarHTML = avatars[group]
    ? `<img src="${avatars[group]}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.6)">`
    : `<div style="width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:white">${group.charAt(0)}</div>`;

  const productsHTML = products.map(p => {
    const done = p.milestones.filter(m => m.status === 'done').length;
    const total = p.milestones.length;
    const pc = p.progress >= 100 ? '#16a34a' : p.progress >= 60 ? '#2563eb' : p.progress >= 30 ? '#d97706' : '#9ca3af';
    const latestU = p.updates && p.updates[0];
    const msHTML = total > 0 ? `
      <div class="tp-detail-milestones">
        ${p.milestones.map(m => `
        <div class="tpdm-item ${esc(m.status)}">
          <div class="tpdm-dot">${m.status==='done'?'✓':''}</div>
          <div class="tpdm-name">${esc(m.name)}</div>
        </div>`).join('')}
      </div>` : '';
    return `
    <div class="tp-detail-product" onclick="openDetailPage('${esc(p.id)}')">

function uploadTeamAvatar(group, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 500000) { alert('图片太大，请压缩到 500KB 以内'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    if (!appData.teamAvatars) appData.teamAvatars = {};
    appData.teamAvatars[group] = e.target.result;
    saveData();
    renderCards();
    flash(group + ' 头像已更新');
  };
  reader.readAsDataURL(file);
}

function renderGrouped(list, grid) {
  grid.className = '';
  const groupOrder = ['Yuetai Shang', 'Yang Li', 'Haibo Zhang', 'Yong Liu'];
  const groupColors = { 'Yuetai Shang': '#2563eb', 'Yang Li': '#d97706', 'Haibo Zhang': '#16a34a', 'Yong Liu': '#7c3aed' };
  const groups = [...new Set(appData.products.map(p => p.group || 'Other'))].sort((a,b) => {
    const ai = groupOrder.indexOf(a), bi = groupOrder.indexOf(b);
    return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
  });
  grid.innerHTML = groups.map(group => {
    const items = list.filter(p => (p.group || 'Other') === group);
    if (!items.length) return '';
    const color = groupColors[group] || '#6b7280';
    const avg = Math.round(items.reduce((a,p) => a+p.progress, 0) / items.length);
    const statusCounts = items.reduce((m,p) => { m[p.status] = (m[p.status]||0)+1; return m; }, {});
    const statusSummary = Object.entries(statusCounts).map(([s,c]) => `${s} ${c}`).join(' · ');
    return `
    <div class="group-section">
      <div class="group-header" style="background:${color};color:white">
        <div class="group-header-dot" style="background:rgba(255,255,255,.5)"></div>
        <div>
          <div class="group-header-name">${esc(group)}</div>
          <div class="group-header-meta">${items.length} 个产品 · ${esc(statusSummary)}</div>
        </div>
        <div class="group-header-progress">
          <div class="group-mini-bar"><div class="group-mini-fill" style="width:${avg}%"></div></div>
          <span class="group-mini-pct" style="color:white">${avg}%</span>
        </div>
      </div>
      <div class="grid">${items.map(cardHTML).join('')}</div>
    </div>`;
  }).join('');
}

function setView(mode) {
  viewMode = mode;
  document.getElementById('vbtn-grid').classList.toggle('active', mode === 'grid');
  document.getElementById('vbtn-group').classList.toggle('active', mode === 'group');
  renderCards();
}

function cardHTML(p) {
  const done = p.milestones.filter(m=>m.status==='done').length;
  const pc = p.progress >= 100 ? '#16a34a' : p.progress >= 60 ? '#2563eb' : p.progress >= 30 ? '#d97706' : '#9ca3af';
  const docCount = (p.documents||[]).length;
  const todayCard = new Date(); todayCard.setHours(0,0,0,0);
  const currentM = p.milestones.find(m => m.status === 'current')
    || p.milestones.find(m => m.status === 'upcoming');

  // mini milestone track
  let msMini = '';
  if (p.milestones.length > 0) {
    const dots = p.milestones.map((m, i) => {
      const overdue = m.status !== 'done' && m.date && new Date(m.date) < todayCard;
      const cls = overdue ? 'overdue' : m.status;
      const line = i < p.milestones.length - 1
        ? `<div class="card-ms-line ${m.status==='done'?'done':''}"></div>` : '';
      return `<div class="card-ms-dot ${cls}" title="${esc(m.name)} · ${esc(m.date)}"></div>${line}`;
    }).join('');
    const curLabel = currentM ? `<div class="card-ms-cur-label">${esc(currentM.name)}</div>` : '';
    msMini = `<div class="card-ms">
      <div class="card-ms-track">${dots}</div>
      ${curLabel}
    </div>`;
  }
  const stageHTML = msMini;
  return `
  <div class="card" onclick="openDetailPage('${esc(p.id)}')">
    ${p.coverImage
      ? `<div style="height:120px;background:url('${p.coverImage}') center/cover;border-radius:10px 10px 0 0;margin:-18px -18px 14px;"></div>`
      : `<div class="card-line-bar" style="background:${esc(p.lineColor)}"></div>`
    }
    <div class="card-header">
      <span class="card-id">${esc(p.id)}</span>
      <div class="card-actions">
        <button class="edit-card-btn" onclick="event.stopPropagation();openEdit('${esc(p.id)}')">编辑</button>
        <span class="badge status-${esc(p.status)}"><span class="badge-dot status-dot-${esc(p.status)}"></span>${esc(p.status)}</span>
      </div>
    </div>
    <div class="card-name">${esc(p.name)}</div>
    <div class="card-line">${esc(p.line)}</div>
    <div class="card-desc">${esc(p.description)}</div>
    ${stageHTML}
    <div class="progress-wrap" style="margin-top:10px">
      <div class="progress-header">
        <span class="progress-text">里程碑 ${done}/${p.milestones.length}</span>
        <span class="progress-pct" style="color:${pc}">${p.progress}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p.progress}%;background:${pc}"></div></div>
    </div>
    <div class="card-footer">
      <div class="card-owner"><div class="avatar" style="background:${esc(p.ownerBg)}">${esc(p.owner[0])}</div>${esc(p.owner)}</div>
      <div style="display:flex;align-items:center;gap:8px">
        ${docCount ? `<span class="doc-count">${docCount} 个文档</span>` : ''}
        <span class="card-dates">目标 ${esc(p.targetDate)}</span>
      </div>
    </div>
  </div>`;
}

function saveName(id) {
  const name = document.getElementById('e-pname').value.trim();
  if (!name) { alert('名称不能为空'); return; }
  const p = appData.products.find(x=>x.id===id);
  p.name = name;
  document.getElementById('e-name').textContent = name;
  saveData(); renderCards(); renderStats();
  flash('产品名称已保存');
}

function uploadCover(id, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 800000) { alert('图片太大，请压缩到 500KB 以内再上传'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const p = appData.products.find(x=>x.id===id);
    p.coverImage = e.target.result;
    saveData(); renderCards();
    openEdit(id);

let pendingPlanItems = [];

function planItemsHTML(nextPlan, pid, logId, interactive) {
  const items = Array.isArray(nextPlan) ? nextPlan : (nextPlan ? [{ id:'legacy', text: nextPlan, done: false }] : []);
  if (!items.length) return '<span style="color:#94a3b8;font-size:13px">—</span>';
  return items.map(item => {
    const cls = `plan-item ${item.done?'done':''} ${interactive?'interactive':''}`;
    const handler = interactive ? `onclick="event.stopPropagation();togglePlanItem('${esc(pid)}','${esc(logId)}','${esc(item.id)}')"` : '';
    return `<div class="${cls}" ${handler}>
      <div class="plan-check ${item.done?'done':''}">${item.done?'✓':''}</div>
      <span class="plan-text">${esc(item.text)}</span>
    </div>`;
  }).join('');
}

function togglePlanItem(pid, logId, itemId) {

function addWeeklyLog(id) {
  const meetingDate = document.getElementById('e-meeting-date').value;
  const author = document.getElementById('e-wl-author').value.trim();
  const completed = document.getElementById('e-completed').value.trim();
  if (!meetingDate) { alert('请选择会议日期'); return; }
  if (!completed && pendingPlanItems.length === 0) { alert('请至少填写会议纪要或添加本周计划项'); return; }
  const p = appData.products.find(x => x.id === id);
  if (!p.weeklyLogs) p.weeklyLogs = [];
  const existing = p.weeklyLogs.find(l => l.meetingDate === meetingDate);
  const isUpdate = !!existing;
  if (existing) {
    existing.author = author;
    existing.completed = completed;
    existing.nextPlan = [...pendingPlanItems];
  } else {
    p.weeklyLogs.unshift({ id: 'wl' + Date.now(), meetingDate, author, completed, nextPlan: [...pendingPlanItems] });
  }
  pendingPlanItems = [];
  saveData(); renderCards(); renderDigest(); renderProductMilestones();
  openEdit(id);
  flash(isUpdate ? '周会记录已更新' : '周会记录已新建');
}

function startEditMsTask(id, idx, taskId, el) {
  const cur = el.textContent;
  const input = document.createElement('input');
  input.value = cur;
  input.style.cssText = 'flex:1;font-size:12px;padding:1px 5px;border:1px solid #93c5fd;border-radius:4px;outline:none;font-family:inherit;width:100%';
  el.replaceWith(input);
  input.focus();
  input.select();
  const save = () => {
    const val = input.value.trim();
    if (val && val !== cur) saveMsTaskText(id, idx, taskId, val);
    else {
      const span = document.createElement('span');
      span.id = el.id; span.style.cssText = el.style.cssText;
      span.setAttribute('ondblclick', el.getAttribute('ondblclick'));
      span.setAttribute('title', '双击编辑');
      span.textContent = cur;
      input.replaceWith(span);
    }
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = cur; input.blur(); }
  });
}

function saveMsTaskText(id, idx, taskId, text) {
  const p = appData.products.find(x=>x.id===id);
  const task = (p.milestones[idx].tasks||[]).find(t=>t.id===taskId);

  saveData(); renderProductMilestones();

let msDragSrc = null;
function msDragStart(e, id, i) {
  msDragSrc = i;
  e.dataTransfer.effectAllowed = 'move';
}
function msDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function msDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function msDrop(e, id, i) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (msDragSrc === null || msDragSrc === i) return;
  const p = appData.products.find(x=>x.id===id);
  const moved = p.milestones.splice(msDragSrc, 1)[0];
  p.milestones.splice(i, 0, moved);
  msDragSrc = null;
  saveData(); renderCards(); renderProductMilestones();
  document.getElementById('e-milestones').innerHTML =
    p.milestones.map((m, idx) => milestoneRowHTML(id, m, idx)).join('');
}

function createProduct() {
  const name = document.getElementById('c-name').value.trim();
  const owner = document.getElementById('c-owner').value.trim();
  const desc = document.getElementById('c-desc').value.trim();
  if (!name || !owner || !desc) { alert('请填写产品名称、负责人和描述'); return; }

  const line = document.getElementById('c-line').value;
  const group = document.getElementById('c-group').value;
  const lineColors = { Hiplant: '#16a34a', Sunet: '#ea580c', Ulight: '#7c3aed' };
  const ownerColors = ['#2563eb','#d97706','#7c3aed','#0891b2','#be185d','#16a34a'];
  const maxNum = appData.products.reduce((max, p) => {
    const n = parseInt(p.id.replace('P','')) || 0;
    return Math.max(max, n);
  }, 0);
  const newId = 'P' + String(maxNum + 1).padStart(3, '0');

  const newProduct = {
    id: newId,
    name,
    group,
    line,
    lineColor: lineColors[line] || '#6b7280',
    owner,
    ownerBg: ownerColors[maxNum % ownerColors.length],
    status: document.getElementById('c-status').value,
    progress: 0,
    startDate: document.getElementById('c-start').value || new Date().toISOString().slice(0,10),
    targetDate: document.getElementById('c-target').value || '',
    description: desc,
    goal: document.getElementById('c-goal').value.trim() || desc,
    milestones: createMilestones.filter(Boolean),
    updates: [],
    documents: []
  };

  appData.products.push(newProduct);
  saveData();
  renderCards();
  renderStats();
  closeModal('create-overlay');
  flash('产品「' + name + '」已创建');
  // update line filters
  const lines = [...new Set(appData.products.map(p => p.line))];
  const lf = document.getElementById('line-filters');
  lf.innerHTML = '<button class="fbtn active" onclick="setFilter(\'line\',\'all\',this)">全部</button>' +
    lines.map(l => `<button class="fbtn" onclick="setFilter('line','${esc(l)}',this)">${esc(l)}</button>`).join('');
}

  history.back();

function renderDetailPage(id) {
  const p = appData.products.find(x => x.id === id);
  if (!p) return;

  const done = p.milestones.filter(m => m.status === 'done').length;
  const total = p.milestones.length;
  const pc = p.progress >= 100 ? '#16a34a' : p.progress >= 60 ? '#2563eb' : p.progress >= 30 ? '#d97706' : '#9ca3af';
  const groupColors = {'Yuetai Shang':'#2563eb','Yang Li':'#d97706','Haibo Zhang':'#16a34a','Yong Liu':'#7c3aed'};
  const heroColor = groupColors[p.group] || p.lineColor || '#1e293b';

  // Countdown stats
  let cdNum = '—', cdLabel = '无截止日期', cdColor = '#9ca3af';
  if (p.status === '已上线') {
    cdNum = '✓'; cdLabel = '已成功上线'; cdColor = '#16a34a';
  } else if (p.targetDate) {
    const days = Math.ceil((new Date(p.targetDate) - new Date()) / 86400000);
    cdNum = Math.abs(days);
    cdLabel = days < 0 ? '天 · 已超期' : days <= 30 ? '天 · 即将到期' : '天 · 距截止';
    cdColor = days < 0 ? '#dc2626' : days <= 30 ? '#d97706' : '#2563eb';
  }

  const heroBg = p.coverImage
    ? `background-image:url('${p.coverImage}');background-size:cover;background-position:center;`
    : `background:linear-gradient(135deg,${heroColor} 0%,${heroColor}bb 100%);`;
  const docs = p.documents || [];

  // sidebar: next steps compact
  const nsAll = p.nextSteps || [];
  const nsTodayRef = new Date();
  const nsSidebarHTML = nsAll.length ? nsAll.slice(0,5).map(s => {
    return `<div class="sb-ns-item">
      <div class="sb-ns-check ${s.done?'done':''}">${s.done?'✓':''}</div>
      <div class="sb-ns-text ${s.done?'done':''}">${esc(s.text)}</div>
    </div>`;
  }).join('') + (nsAll.length > 5 ? `<div style="font-size:11px;color:#94a3b8;padding-top:4px">还有 ${nsAll.length-5} 项</div>` : '')
  : `<div style="font-size:12px;color:#94a3b8">暂无行动项</div>`;

  const page = document.getElementById('detail-page');
  page.innerHTML = `
    <div class="detail-nav">
      <button class="back-btn" onclick="closeDetailPage()">← 返回看板</button>
      <span style="font-size:12px;color:var(--text-muted);font-family:monospace">${esc(p.id)}</span>
      <button class="hbtn" style="margin-left:auto" onclick="openEdit('${esc(id)}')">编辑</button>
    </div>

    <div class="dp-layout">

      <!-- 左主内容 -->
      <div class="dp-main">

        <div class="dp-hero" style="${heroBg}">
          ${p.coverImage ? '<div class="dp-hero-overlay"></div>' : ''}
          <div class="dp-hero-content">
            <div style="margin-bottom:10px">
              <span style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);color:white;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:600">
                <span style="width:5px;height:5px;border-radius:50%;background:white;display:inline-block"></span>${esc(p.status)}
              </span>
            </div>
            <div class="dp-hero-title">${esc(p.name)}</div>
            <div class="dp-hero-meta">
              <span style="display:inline-flex;align-items:center;gap:6px">
                <span style="width:20px;height:20px;border-radius:50%;background:${esc(p.ownerBg)};display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white">${esc(p.owner[0])}</span>
                ${esc(p.owner)}
              </span>
              <span style="opacity:.45">·</span><span>${esc(p.group||'—')}</span>
              ${p.line?`<span style="opacity:.45">·</span><span>${esc(p.line)}</span>`:''}
            </div>
            ${p.description?`<div class="dp-hero-desc">${esc(p.description)}</div>`:''}
          </div>
          <div class="dp-hero-progress"><div style="height:100%;width:${p.progress}%;background:${pc}"></div></div>
        </div>

        ${total > 0 ? (() => {
          const selIdx = selectedMsMap[p.id] !== undefined ? selectedMsMap[p.id]
            : (p.milestones.findIndex(m=>m.status==='current') >= 0 ? p.milestones.findIndex(m=>m.status==='current') : 0);
          const selM = p.milestones[selIdx];
          const tasks = selM ? (selM.tasks||[]) : [];
          const doneCnt = tasks.filter(t=>t.done).length;
          return `
        <div class="detail-section" style="margin-top:20px">
          <div class="detail-section-title">里程碑进度</div>
          <div class="ms-tl">
            ${p.milestones.map((m,mi) => {
              const todayMs = new Date(); todayMs.setHours(0,0,0,0);
              const mDate = m.date ? new Date(m.date) : null;
              const overdue = m.status !== 'done' && mDate && mDate < todayMs;
              const overdueDays = overdue ? Math.ceil((todayMs - mDate) / 86400000) : 0;
              const cls = (overdue ? 'overdue' : m.status) + (mi===selIdx ? ' selected' : '');
              return `<div class="ms-item ${esc(cls)}" onclick="selectMs('${esc(p.id)}',${mi})">
                <div class="ms-dot">${m.status==='done'?'✓':overdue?'!':m.status==='current'?'●':''}</div>
                <div class="ms-name">${esc(m.name)}</div>
                <div class="ms-date">${esc(m.date)}</div>
                ${m.status==='current' ? (()=>{ const t=(m.tasks||[]).find(x=>!x.done); return t?`<div style="font-size:10px;color:#92400e;text-align:center;margin-top:3px;line-height:1.3;font-weight:600">▸ ${esc(t.text)}</div>`:''; })() : ''}
                ${overdue ? `<div class="overdue-tag">超期 ${overdueDays} 天</div>` : ''}
              </div>`;
            }).join('')}
          </div>
          ${selM ? `<div class="ms-task-panel">
            <div class="ms-task-panel-title">
              <span>${esc(selM.name)}</span>
              ${tasks.length ? `<span style="font-size:12px;font-weight:400;color:#94a3b8">${doneCnt}/${tasks.length} 完成</span>` : ''}
            </div>
            ${tasks.length === 0
              ? `<div style="font-size:13px;color:#94a3b8">暂无子任务 · 在编辑中添加</div>`
              : tasks.map(t=>`
              <div class="ms-task-item ${t.done?'done':''}" onclick="toggleMsTask('${esc(p.id)}',${selIdx},'${esc(t.id)}')">
                <div class="ms-task-check ${t.done?'done':''}">${t.done?'<span style="font-size:9px;font-weight:700;color:white">✓</span>':''}</div>
                <span class="ms-task-text">${esc(t.text)}</span>
              </div>`).join('')}
          </div>` : ''}
        </div>`;
        })() : ''}


        ${nsAll.length || editMode ? `
        <div class="detail-section">
          <div class="detail-section-title">下一步行动</div>
          ${nsAll.length ? `<div class="ns-list">${nsAll.map(s => {
            let dueHTML = '';
            if (s.dueDate) {
              const diff = Math.ceil((new Date(s.dueDate) - nsTodayRef) / 86400000);
              const cls = diff < 0 ? 'overdue' : diff <= 7 ? 'soon' : 'ok';
              const label = diff < 0 ? `超期 ${Math.abs(diff)} 天` : diff === 0 ? '今天截止' : `${diff} 天后`;
              dueHTML = `<span class="ns-due ${cls}">${label}</span>`;
            }
            return `<div class="ns-item ${s.done?'done':''}">
              <div class="ns-check" onclick="toggleNextStep('${esc(p.id)}','${esc(s.id)}')">${s.done?'✓':''}</div>
              <div class="ns-body">
                <div class="ns-text">${esc(s.text)}</div>
                <div class="ns-meta">${s.assignee?`<span class="ns-assignee">@ ${esc(s.assignee)}</span>`:''}${dueHTML}</div>
              </div>
            </div>`;
          }).join('')}</div>` : `<div class="ns-empty">暂无行动项 · 点右上角编辑添加</div>`}
        </div>` : ''}

        ${docs.length > 0 ? `
        <div class="detail-section">
          <div class="detail-section-title">文档附件</div>
          <div class="doc-list">
            ${docs.map(d => `
            <div class="doc-item">
              <div class="doc-icon">${docIcon(d.type)}</div>
              <div class="doc-info">
                <div class="doc-name">${esc(d.name)}</div>
                <div class="doc-meta">${esc(d.type)} · ${esc(d.addedBy)} · ${esc(d.addedDate)}</div>
              </div>
              <div class="doc-actions"><a class="doc-open-btn" href="${esc(d.url)}" target="_blank" rel="noopener">打开</a></div>
            </div>`).join('')}
          </div>
        </div>` : ''}

        ${(() => {
          const logs = ((p.weeklyLogs||[]).length ? p.weeklyLogs : []).slice().sort((a,b)=>b.meetingDate>a.meetingDate?1:-1);
          if (!logs.length) return `<div class="detail-section"><div class="detail-section-title">周会记录</div><div class="ns-empty">暂无周会记录 · 点编辑添加</div></div>`;
          return `<div class="detail-section">
            <div class="detail-section-title">周会记录</div>
            ${logs.map(l=>`
            <div class="wl-card">
              <div class="wl-header">
                <span class="wl-date">${esc(l.meetingDate)} 周会</span>
                <span class="wl-author">${esc(l.author||'')}</span>
                <span class="wl-edit-btn" onclick="loadWeeklyLogToEdit('${esc(p.id)}','${esc(l.id)}')">编辑</span>
                <span class="wl-delete" onclick="deleteWeeklyLog('${esc(p.id)}','${esc(l.id)}')">✕</span>
              </div>
              <div class="wl-body">
                <div class="wl-nextplan"><div class="wl-label">本周计划</div>${planItemsHTML(l.nextPlan, p.id, l.id, true)}</div>
                <div class="wl-completed"><div class="wl-label">会议纪要</div><div class="wl-text">${esc(l.completed||'—')}</div></div>
              </div>
            </div>`).join('')}
          </div>`;
        })()}

      </div>

      <!-- 右侧边栏 -->
      <div class="dp-sidebar">

        <div class="sb-block">
          <div class="sb-heading">状态</div>
          <span class="badge status-${esc(p.status)}" style="font-size:12px;padding:4px 12px">
            <span class="badge-dot status-dot-${esc(p.status)}"></span>${esc(p.status)}
          </span>
        </div>

        <div class="sb-block">
          <div class="sb-heading">整体进度</div>
          <div class="sb-progress-num" style="color:${pc}">${p.progress}%</div>
          <div class="sb-progress-bar"><div style="height:100%;width:${p.progress}%;background:${pc}"></div></div>
        </div>

        <div class="sb-block">
          <div class="sb-heading">基本信息</div>
          <div class="sb-meta-row"><span class="sb-meta-label">负责人</span><span class="sb-meta-val">${esc(p.owner)}</span></div>
          <div class="sb-meta-row"><span class="sb-meta-label">所属团队</span><span class="sb-meta-val">${esc(p.group||'—')}</span></div>
          ${p.line?`<div class="sb-meta-row"><span class="sb-meta-label">业务线</span><span class="sb-meta-val">${esc(p.line)}</span></div>`:''}
          ${p.startDate?`<div class="sb-meta-row"><span class="sb-meta-label">启动</span><span class="sb-meta-val">${esc(p.startDate)}</span></div>`:''}
          ${p.targetDate?`<div class="sb-meta-row"><span class="sb-meta-label">目标</span><span class="sb-meta-val">${esc(p.targetDate)}</span></div>`:''}
          ${p.goal?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)"><div style="font-size:11px;color:#94a3b8;margin-bottom:5px">产品目标</div><div style="font-size:12px;color:#374151;line-height:1.6;white-space:pre-wrap">${esc(p.goal)}</div></div>`:''}
        </div>

        <div class="sb-block">
          <div class="sb-heading">里程碑</div>
          <div style="font-size:20px;font-weight:800;line-height:1;margin-bottom:4px">${done}<span style="font-size:13px;font-weight:500;color:#94a3b8"> / ${total} 完成</span></div>
          ${(() => {
            const cur = p.milestones.find(m => m.status==='current') || p.milestones.find(m => m.status==='upcoming');
            return cur ? `<div style="font-size:12px;color:#64748b;margin-top:6px">当前：${esc(cur.name)}</div>` : '';
          })()}
        </div>

        <div class="sb-block">
          <div class="sb-heading">截止倒计时</div>
          <div style="font-size:20px;font-weight:800;line-height:1;color:${cdColor}">${cdNum}</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:4px">${cdLabel}</div>
        </div>

        <div class="sb-block">
          <div class="sb-heading">下一步行动 (${nsAll.length})</div>
          ${nsSidebarHTML}
        </div>

      </div>
    </div>
  `;
  page.classList.add('open');
  page.scrollTop = 0;
}

window.addEventListener('popstate', (e) => {
  const hash = window.location.hash.replace('#', '');
  if (!hash) {
    document.getElementById('detail-page').classList.remove('open');
    document.getElementById('team-page').classList.remove('open');
    if (appData) { renderCards(); renderStats(); renderDigest(); renderProductMilestones(); }
  } else if (hash.startsWith('team-')) {
    document.getElementById('detail-page').classList.remove('open');
    const group = hash.replace('team-', '').replace(/-/g, ' ');
    if (appData) renderTeamPage(group);
  } else {
    document.getElementById('team-page').classList.remove('open');
    if (appData) renderDetailPage(hash);
  }
});

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
